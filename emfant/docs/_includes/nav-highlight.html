<script>
// Highlight active navigation item based on scroll position
// Switches to next section when the section divider reaches viewport center
(function() {
  const sections = document.querySelectorAll('.section[id]');
  const navLinks = document.querySelectorAll('.nav-links a[data-section]');
  const navContainer = document.querySelector('.nav-container');
  const tabNavContainer = document.querySelector('.tab-nav-container');
  const navToggle = document.querySelector('.nav-toggle');
  const tabNavToggle = document.querySelector('.tab-nav-toggle');

  // Logo click: if already on home, smooth scroll to top instead of navigating
  document.querySelectorAll('.nav-logo, .tab-nav-logo').forEach(function(logo) {
    logo.addEventListener('click', function(e) {
      var href = this.getAttribute('href') || '';
      var path = window.location.pathname.replace(/\/$/, '') || '/';
      var hrefNorm = href.replace(/\/$/, '') || '/';
      if (path === hrefNorm || path === href) {
        e.preventDefault();
        window.scrollTo(0, 0);
      }
    });
  });
  
  function updateActiveNav() {
    let current = '';
    const scrollY = window.pageYOffset || window.scrollY;
    const viewportCenter = scrollY + (window.innerHeight / 2);
    
    // Check each section to determine which should be active
    sections.forEach((section, index) => {
      const sectionTop = section.offsetTop - 100;
      const sectionId = section.getAttribute('id');
      const nextSection = sections[index + 1];
      const nextSectionTop = nextSection ? (nextSection.offsetTop - 100) : Infinity;
      
      // If viewport center has passed the next section's start, switch to next section
      // Otherwise, if viewport center is within this section, use current section
      if (viewportCenter >= sectionTop) {
        if (nextSection && viewportCenter >= nextSectionTop) {
          // Viewport center has passed next section's start
          current = nextSection.getAttribute('id');
        } else if (viewportCenter < nextSectionTop) {
          // Viewport center is still in current section
          current = sectionId;
        }
      }
    });
    
    navLinks.forEach(link => {
      link.classList.remove('active');
      if (link.getAttribute('data-section') === current) {
        link.classList.add('active');
      }
    });

    // Logo active when at top (no section active = hero area)
    document.querySelectorAll('.nav-logo, .tab-nav-logo').forEach(function(logo) {
      if (current === '') {
        logo.classList.add('active');
      } else {
        logo.classList.remove('active');
      }
    });
  }
  
  window.addEventListener('scroll', updateActiveNav);
  window.addEventListener('load', updateActiveNav);
  window.addEventListener('resize', updateActiveNav);

  // Hamburger toggle handlers (mobile nav)
  function setupToggle(container, toggleSelector, openClass, menuSelector) {
    if (!container) return;
    const toggle = container.querySelector(toggleSelector);
    const menu = container.querySelector(menuSelector);
    if (!toggle || !menu || typeof toggle.addEventListener !== 'function') return;

    toggle.addEventListener('click', function() {
      const isOpen = container.classList.toggle(openClass);
      toggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
    });

    // Close menu when a link inside the menu is clicked; for anchor links, scroll so nav stays visible
    menu.querySelectorAll('a').forEach(function(link) {
      link.addEventListener('click', function(e) {
        var href = link.getAttribute('href') || '';
        if (href.indexOf('#') === 0) {
          var id = href.slice(1);
          var target = document.getElementById(id);
          if (target) {
            e.preventDefault();
            var navHeight = (document.querySelector('.nav-container') || document.querySelector('.tab-nav-container') || {}).offsetHeight || 0;
            var y = target.getBoundingClientRect().top + (window.pageYOffset || document.documentElement.scrollTop) - navHeight;
            window.scrollTo({ top: y, behavior: 'smooth' });
          }
        }
        container.classList.remove(openClass);
        toggle.setAttribute('aria-expanded', 'false');
      });
    });
  }

  setupToggle(navContainer, '.nav-toggle', 'nav-open', '.nav-menu');
  setupToggle(tabNavContainer, '.tab-nav-toggle', 'tab-nav-open', '.tab-nav-menu');
})();
</script>
