# Build and deploy: root + clock/ + emfant/ (at /emfant)
name: Deploy to GitHub Pages

on:
  push:
    branches: ["master"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1"
          bundler-cache: false

      - name: Install GitHub Pages (Jekyll + plugins, no sass conflict)
        run: "gem install github-pages"

      - name: "Build Jekyll for /emfant (baseurl /emfant)"
        run: "jekyll build --source emfant/docs --destination _site --baseurl /emfant"

      - name: Assemble deploy (root + clock + emfant)
        run: |
          mkdir -p deploy/emfant
          cp -r _site/* deploy/emfant/
          cp -r clock deploy/
          cp index.html deploy/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
